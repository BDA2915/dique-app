<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

/* ================================================================
   CONFIGURACIÓN — TUS DATOS DE FIREBASE
================================================================ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCW8ub-1csVMipPVYNDGGL_lRlPikK-x98",
  authDomain:        "dique-produccion.firebaseapp.com",
  projectId:         "dique-produccion",
  storageBucket:     "dique-produccion.firebasestorage.app",
  messagingSenderId: "879206224362",
  appId:             "1:879206224362:web:d6146dc6153f3af995a293"
};
const EDITOR_PASSWORD = "dique2026";
/* ================================================================ */

const STATUS = {
  none: { label:'Sin montar', bg:'#D3D1C7', bd:'#888780', tx:'#2C2C2A' },
  wip:  { label:'En proceso', bg:'#FAC775', bd:'#BA7517', tx:'#412402' },
  done: { label:'Terminado',  bg:'#C0DD97', bd:'#3B6D11', tx:'#173404' }
};
const DEFAULT_BLOCKS = [
  'F01B','F02B','F03B','F04B','F05B','F06B','F07B','F08B',
  'F01E','F02E','F03E','F04E','F05E','F06E','F07E','F08E',
  'VOPP','VOPR'
];
const SHIFTS = ['mañana','tarde'];

// ── Estado ────────────────────────────────────────────────────────
let db, blockList=[], blockData={}, elements=[], taskDefs=[], taskLogs=[], weeklyStaff=[];
let isEditor = localStorage.getItem('dique_editor')==='true';
let view='mapa', selBlock=null, bTab='tasks', eTab='stock', tpTab='defs';
let editingTermId=null, editingTaskLogId=null, editingStaffId=null;
let toastInfo=null, renderPending=false;

// ── Helpers generales ─────────────────────────────────────────────
const todayStr = () => new Date().toISOString().slice(0,10);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid = () => Date.now() + Math.random()*1000|0;

// ── Helpers bloques ───────────────────────────────────────────────
const tDone = t => (t.logs||[]).reduce((s,l)=>s+(+l.qty||0),0);
const tPct  = t => t.total ? Math.min(100,Math.round(tDone(t)/t.total*100)) : 0;
function bProg(id) {
  const b=blockData[id]||{status:'none',tasks:[]};
  if(!b.tasks?.length) return {done:0,total:0,pct:b.status==='done'?100:0};
  let d=0,t=0; b.tasks.forEach(tk=>{d+=tDone(tk);t+=(+tk.total||0);});
  return {done:d,total:t,pct:t?Math.round(d/t*100):0};
}
function gProg() {
  let d=0,t=0; blockList.forEach(id=>{const p=bProg(id);d+=p.done;t+=p.total;});
  return {done:d,total:t,pct:t?Math.round(d/t*100):0};
}

// ── Helpers elementos ─────────────────────────────────────────────
const eProd     = e => (e.logs||[]).reduce((s,l)=>s+(+l.qty||0),0);
const eAssigned = e => (e.assignments||[]).reduce((s,a)=>s+(+a.qty||0),0);
const eAvail    = e => Math.max(0,eProd(e)-eAssigned(e));
const ePct      = e => e.total?Math.min(100,Math.round(eProd(e)/e.total*100)):0;
function blockAssigned(blockId,eid){
  const e=elements.find(x=>x.id===eid);
  return e?(e.assignments||[]).filter(a=>a.blockId===blockId).reduce((s,a)=>s+(+a.qty||0),0):0;
}
function elemGlobalProg(){
  let prod=0,total=0; elements.forEach(e=>{prod+=eProd(e);total+=(+e.total||0);});
  return {prod,total,pct:total?Math.round(prod/total*100):0};
}
function termByDay() {
  const map={};
  elements.forEach(e=>(e.logs||[]).forEach(l=>{map[l.date]=(map[l.date]||0)+(+l.qty||0);}));
  return Object.entries(map).sort(([a],[b])=>a.localeCompare(b));
}
function todayTerminados(){
  const td=todayStr(); let u=0;
  elements.forEach(e=>(e.logs||[]).forEach(l=>{if(l.date===td)u+=(+l.qty||0);}));
  return u;
}

// ── Helpers tareas ────────────────────────────────────────────────
function getWeekNum(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const dow=d.getDay()||7;
  d.setDate(d.getDate()+4-dow);
  const ys=new Date(d.getFullYear(),0,1);
  return {week:Math.ceil(((d-ys)/86400000+1)/7),year:d.getFullYear()};
}
function tasksByWeek(){
  const map={};
  taskLogs.forEach(log=>{
    const {week,year}=getWeekNum(log.date);
    const key=`${year}-W${String(week).padStart(2,'0')}`;
    if(!map[key])map[key]={week,year,key,mañana:0,tarde:0};
    if(log.shift==='mañana')map[key].mañana+=(+log.qty||0);
    else map[key].tarde+=(+log.qty||0);
  });
  return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key));
}
function getStaff(week,year){return weeklyStaff.find(s=>s.week===week&&s.year===year)||null;}

// ── Firebase ──────────────────────────────────────────────────────
async function init(){
  let app;
  try{app=initializeApp(FIREBASE_CONFIG);}
  catch(e){document.getElementById('root').innerHTML=`<div class="error-box"><strong>Error de configuración Firebase</strong><br>${e.message}</div>`;return;}
  db=getFirestore(app);
  try{
    const cfgSnap=await getDoc(doc(db,'config','settings'));
    if(cfgSnap.exists()&&cfgSnap.data().blocks?.length)blockList=cfgSnap.data().blocks;
    else{blockList=[...DEFAULT_BLOCKS];await setDoc(doc(db,'config','settings'),{blocks:blockList});}
  }catch(e){document.getElementById('root').innerHTML=`<div class="error-box"><strong>No se pudo conectar con Firebase</strong><br>Revisá las reglas de Firestore.<br><br>${e.message}</div>`;return;}

  blockList.forEach(id=>{
    onSnapshot(doc(db,'blocks',id),snap=>{blockData[id]=snap.exists()?snap.data():{status:'none',tasks:[]};scheduleRender();});
  });
  onSnapshot(doc(db,'config','elements'),snap=>{elements=snap.exists()?(snap.data().list||[]):[];scheduleRender();});
  onSnapshot(doc(db,'config','taskdefs'),snap=>{taskDefs=snap.exists()?(snap.data().list||[]):[];scheduleRender();});
  onSnapshot(doc(db,'config','tasklogs'),snap=>{taskLogs=snap.exists()?(snap.data().list||[]):[];scheduleRender();});
  onSnapshot(doc(db,'config','weeklystaff'),snap=>{weeklyStaff=snap.exists()?(snap.data().list||[]):[];scheduleRender();});
}

function rShip(blbRow,bleRow,leftBow,rightBow){
  function blk(id,bow){
    if(!id)return'';
    const b=blockData[id]||{status:'none',tasks:[]},s=STATUS[b.status]||STATUS.none,p=bProg(id),sel=selBlock===id;
    return`<div class="${bow?'bow-block':'block'}${sel?' sel':''}" style="background:${s.bg};border-color:${s.bd};color:${s.tx}" onclick="selBlockFn('${id}')">

  }
  const sp=`<div style="width:48px;flex-shrink:0;visibility:hidden"></div>`;
  return`<div class="ship-wrap">
    <div class="ship-lbl">Vista de cubierta — popa → proa</div>
    <div class="deck-row"><div class="row-lbl">Bab.</div>
      ${leftBow?`<div style="margin-right:4px">${blk(leftBow,true)}</div>`:''}
      <div class="blocks-row">${blbRow.map(id=>blk(id,false)).join('')}</div>

}

function rPanel(){

  return`<div class="panel">
    <div class="panel-head">

function rPanelTasks(id){
  const tasks=blockData[id]?.tasks||[];
  if(!tasks.length)return`<div class="empty">Sin tareas.${isEditor?' Usá la pestaña "+ Tarea".':''}</div>`;
  return tasks.map(t=>{
    const done=tDone(t),pct=tPct(t),rem=Math.max(0,t.total-done);
    return`<div class="task-row">
      <div class="task-info"><div class="task-name">${esc(t.name)}</div><div class="task-sub">${done} / ${t.total} — faltan ${rem}</div></div>
      <div class="task-prog"><div class="task-bar"><div class="task-fill" style="width:${pct}%"></div></div><div class="task-pct">${pct}%</div></div>
      ${isEditor?`<button class="del-btn" onclick="deleteTask('${id}',${t.id})">×</button>`:''}
    </div>`;
  }).join('');
}

function rMats(id){
  const withQty=elements.map(e=>({e,qty:blockAssigned(id,e.id)})).filter(({qty})=>qty>0);
  const list=withQty.length
    ?withQty.map(({e,qty})=>`<div class="task-row">
        <div class="task-info"><div class="task-name">${esc(e.name)}</div>
        <div class="task-sub">Stock disponible: <strong style="color:${eAvail(e)>0?'#27500A':'#888780'}">${eAvail(e)}</strong></div></div>
        <div style="font-size:16px;font-weight:500;min-width:55px;text-align:right">${qty} u.</div>
      </div>`).join('')
    :`<div class="empty" style="margin-bottom:12px">Sin materiales asignados.</div>`;
  const form=isEditor&&elements.length?`
    <div class="section-title" style="margin-top:14px;padding-top:12px;border-top:.5px solid #dddcd6">Asignar desde stock</div>
    <div class="form-grid-3">
      <div class="form-group" style="margin:0"><label class="form-label">Elemento</label>
        <select class="form-input" id="bp-elem"><option value="">—</option>
          ${elements.map(e=>`<option value="${e.id}">${esc(e.name)} (disp: ${eAvail(e)})</option>`).join('')}
        </select></div>
      <div class="form-group" style="margin:0"><label class="form-label">Cantidad</label><input class="form-input" type="number" id="bp-qty" placeholder="0" min="1"></div>
      <div class="form-group" style="margin:0;display:flex;align-items:flex-end"><button class="btn-primary" style="margin:0" onclick="assignFromPanel()">Asignar</button></div>
    </div>`:'';
  return list+form;
}

function rAddTask(){
  return`<div class="form-grid-2">
    <div class="form-group"><label class="form-label">Nombre</label><input class="form-input" id="nt-name" placeholder="Ej: Armado de estructura" onkeydown="if(event.key==='Enter')document.getElementById('nt-total').focus()"></div>
    <div class="form-group"><label class="form-label">Total de unidades</label><input class="form-input" type="number" id="nt-total" placeholder="Ej: 50" min="1" onkeydown="if(event.key==='Enter')addTask()"></div>
  </div>
  <button class="btn-primary" onclick="addTask()">Agregar tarea</button>`;
}

function rLogAdv(id){
  const tasks=blockData[id]?.tasks||[];
  if(!tasks.length)return`<div class="empty">Primero agregá tareas.</div>`;
  return`<div class="form-group" style="margin-bottom:12px"><label class="form-label">Fecha</label><input class="form-input" type="date" id="log-date" value="${todayStr()}" style="max-width:200px"></div>
    <div class="section-title">Unidades del día</div>
    ${tasks.map(t=>{const done=tDone(t),rem=Math.max(0,t.total-done);return`<div class="log-row">
      <div class="log-info"><div class="log-name">${esc(t.name)}</div><div class="log-sub">${tPct(t)}% — restan ${rem}</div></div>
      <input class="log-qty" type="number" id="lq-${t.id}" placeholder="0" min="0">
    </div>`;}).join('')}
    <button class="btn-primary" onclick="submitLog()">Guardar avance</button>`;
}

function rPanelHist(id){
  const tasks=blockData[id]?.tasks||[];
  if(!tasks.length)return`<div class="empty">Sin tareas.</div>`;
  const allDates=new Set();tasks.forEach(t=>(t.logs||[]).forEach(l=>allDates.add(l.date)));
  const dates=[...allDates].sort().reverse();
  if(!dates.length)return`<div class="empty">Sin registros todavía.</div>`;
  return dates.map(date=>{
    const entries=tasks.map(t=>{const log=(t.logs||[]).find(l=>l.date===date);return log&&log.qty?{name:t.name,qty:log.qty}:null;}).filter(Boolean);
    if(!entries.length)return'';
    return`<div class="hist-group"><div class="hist-header"><span>${date}</span><span>${entries.reduce((s,e)=>s+e.qty,0)} u.</span></div>
      ${entries.map(e=>`<div class="hist-row"><span>${esc(e.name)}</span><span style="color:#1a1a18;font-weight:500">+${e.qty}</span></div>`).join('')}</div>`;
  }).join('');
}

// ── AVANCE TOTAL ──────────────────────────────────────────────────
function rAvanceTotal(){
  const gep=elemGlobalProg();
  const totAsig=elements.reduce((s,e)=>s+eAssigned(e),0);

  return`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Avance producción</div><div class="stat-value">${gep.pct}%</div><div class="stat-sub">${gep.prod} / ${gep.total} u.</div></div>
      <div class="stat-card"><div class="stat-label">Tipos de elemento</div><div class="stat-value">${elements.length}</div><div class="stat-sub">definidos</div></div>
      <div class="stat-card"><div class="stat-label">Asignados</div><div class="stat-value" style="color:#185FA5">${totAsig}</div><div class="stat-sub">a bloques</div></div>
      <div class="stat-card"><div class="stat-label">Stock disponible</div><div class="stat-value" style="color:#27500A">${totAvail}</div><div class="stat-sub">sin asignar</div></div>
    </div>
    <div class="tab-header">
      <button class="subtab ${eTab==='stock'?'active':''}"  onclick="setETab('stock')">Stock por elemento</button>

    </div>
    <div class="tab-panel">
      ${eTab==='stock'            ?rElemStock():''}
      ${eTab==='asign'            ?rElemAsign():''}
      ${eTab==='addel'&&isEditor  ?rElemAdd():''}
    </div>`;
}

function rElemStock(){
  if(!elements.length)return`<div class="empty">No hay elementos.${isEditor?' Usá la pestaña "+ Elemento".':''}</div>`;
  return elements.map(e=>{
    const prod=eProd(e),asig=eAssigned(e),avail=eAvail(e),pct=ePct(e);
    const apct=e.total?Math.min(100,Math.round(asig/e.total*100)):0;
    const tag=avail>0?`<span class="stock-ok">${avail} disponibles</span>`:prod>0?`<span class="stock-warn">Stock agotado</span>`:`<span class="stock-none">Sin producción</span>`;
    return`<div class="elem-card">
      <div class="elem-top"><div class="elem-name">${esc(e.name)}</div>
        <div style="display:flex;gap:6px;align-items:center">${tag}${isEditor?`<button class="del-btn" onclick="deleteElement(${e.id})">×</button>`:''}</div>
      </div>
      <div class="elem-nums">
        <div class="en-item"><div class="en-lbl">Necesario</div><div class="en-val">${e.total}</div></div>
        <div class="en-item"><div class="en-lbl">Producido</div><div class="en-val" style="color:#3B6D11">${prod}</div></div>
        <div class="en-item"><div class="en-lbl">Asignado</div><div class="en-val" style="color:#185FA5">${asig}</div></div>
        <div class="en-item"><div class="en-lbl">Disponible</div><div class="en-val" style="color:${avail>0?'#27500A':'#888780'}">${avail}</div></div>
      </div>
      <div style="position:relative;height:5px;background:#dddcd6;border-radius:3px;overflow:hidden">
        <div style="position:absolute;inset:0;width:${pct}%;background:#97C459"></div>
        <div style="position:absolute;inset:0;width:${apct}%;background:rgba(55,138,221,.55)"></div>
      </div>
    </div>`;
  }).join('');
}

function rElemAsign(){
  if(!elements.length)return`<div class="empty">No hay elementos definidos.</div>`;
  const hasA=elements.some(e=>(e.assignments||[]).length>0);
  if(!hasA)return`<div class="empty">Sin asignaciones. Abrí un bloque → Materiales → Asignar.</div>`;
  const byBlock={};
  elements.forEach(e=>{(e.assignments||[]).forEach(a=>{if(!byBlock[a.blockId])byBlock[a.blockId]=[];byBlock[a.blockId].push({eid:e.id,aid:a.id,ename:e.name,qty:a.qty,date:a.date});});});
  return Object.entries(byBlock).sort(([a],[b])=>a.localeCompare(b)).map(([blockId,items])=>{
    const total=items.reduce((s,x)=>s+x.qty,0);
    return`<div class="hist-group"><div class="hist-header"><span style="color:#1a1a18;font-size:12px">${blockId}</span><span>${total} u. totales</span></div>
      ${items.map(x=>`<div class="hist-row">
        <span>${esc(x.ename)}<span style="color:#b8b7b0;margin:0 6px">—</span><span style="color:#888780">${x.date}</span></span>
        <span style="display:flex;align-items:center;gap:8px">
          <span style="color:#1a1a18;font-weight:500">${x.qty} u.</span>
          ${isEditor?`<button class="del-btn" onclick="removeAssignment(${x.eid},'${x.aid}')">×</button>`:''}
        </span>
      </div>`).join('')}</div>`;
  }).join('');
}

function rElemAdd(){
  return`<div class="form-grid-2">
    <div class="form-group"><label class="form-label">Nombre del elemento</label><input class="form-input" id="en-name" placeholder="Ej: Candeleros, Caños, Varillas..." onkeydown="if(event.key==='Enter')document.getElementById('en-total').focus()"></div>

  </div>
  <button class="btn-primary" onclick="addElement()">Agregar elemento</button>
  ${elements.length?`<div style="margin-top:14px;border-top:.5px solid #dddcd6;padding-top:12px"><div class="section-title">Elementos existentes</div>
    ${elements.map(e=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:.5px solid #f0efd8;font-size:13px">
      <span>${esc(e.name)}</span><span style="color:#888780">Total: ${e.total} — Producido: ${eProd(e)}</span></div>`).join('')}</div>`:''}`;
}

function rElementosTerminados(){
  const allLogs=[];
  elements.forEach(e=>(e.logs||[]).forEach(l=>allLogs.push({eid:e.id,ename:e.name,lid:l.id,date:l.date,qty:l.qty})));
  allLogs.sort((a,b)=>b.date.localeCompare(a.date));

  const addForm=isEditor?`<div class="card">
    <div class="card-title">Registrar elementos terminados</div>
    <div class="form-grid-3" style="margin-bottom:8px">
      <div class="form-group" style="margin:0"><label class="form-label">Elemento</label>
        <select class="form-input" id="term-elem"><option value="">— Seleccioná —</option>
          ${elements.map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join('')}
        </select></div>
      <div class="form-group" style="margin:0"><label class="form-label">Fecha</label><input class="form-input" type="date" id="term-date" value="${todayStr()}"></div>
      <div class="form-group" style="margin:0"><label class="form-label">Cantidad</label><input class="form-input" type="number" id="term-qty" placeholder="Ej: 8" min="1" onkeydown="if(event.key==='Enter')addTerminado()"></div>
    </div>
    <button class="btn-primary" onclick="addTerminado()">Registrar</button>
    ${!elements.length?`<div class="empty" style="margin-top:10px">Primero creá elementos en "Avance total" → "+ Elemento".</div>`:''}
  </div>`:'';

  const listHTML=allLogs.length?`<div class="card">
    <div class="card-title">Historial de elementos terminados (${allLogs.length} registros)</div>
    ${allLogs.map(log=>{
      const editing=editingTermId===`${log.eid}_${log.lid}`;
      return`<div class="log-row">
        <div class="log-info"><div class="log-name">${esc(log.ename)}</div><div class="log-sub">${log.date}</div></div>
        ${editing?`
          <input class="inline-input" type="number" id="term-edit-qty" value="${log.qty}" min="1" onkeydown="if(event.key==='Enter')saveTerminado(${log.eid},${log.lid})">
          <button class="save-btn" onclick="saveTerminado(${log.eid},${log.lid})">Guardar</button>
          <button class="cancel-btn" onclick="cancelEditTerm()">Cancelar</button>`
        :`<span style="font-size:16px;font-weight:500;min-width:55px;text-align:right">${log.qty} u.</span>
          ${isEditor?`<button class="edit-btn" onclick="editTerminado(${log.eid},${log.lid})">Editar</button>
          <button class="del-btn" onclick="deleteTerminado(${log.eid},${log.lid})">×</button>`:''}`}
      </div>`;
    }).join('')}
  </div>`:`<div class="empty">Sin registros todavía.${isEditor?' Usá el formulario de arriba.':''}</div>`;

  return addForm+listHTML;
}

function rTareasPorElemento(){
  return`

          ${elements.map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join('')}

      <div class="form-group" style="margin:0"><label class="form-label">Nombre de la tarea</label><input class="form-input" id="td-name" placeholder="Ej: Cortar, Trazar, Amolar..." onkeydown="if(event.key==='Enter')addTaskDef()"></div>

function rTpCargar(){
  return`<div class="form-grid-4" style="margin-bottom:8px">
    <div class="form-group" style="margin:0"><label class="form-label">Elemento</label>
      <select class="form-input" id="tl-elem" onchange="updateTaskSelect()"><option value="">—</option>

function rTpHist(){
  if(!taskLogs.length)return`<div class="empty">Sin registros de avance.${isEditor?' Usá la pestaña "Cargar avance".':''}</div>`;
  const sorted=[...taskLogs].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  return sorted.map(log=>{
    const editing=editingTaskLogId===log.id;
    return`<div class="log-row">
      <div class="log-info">
        <div class="log-name">${esc(log.elementName)} — ${esc(log.taskName)}</div>
        <div class="log-sub">${log.date} &nbsp; <span class="badge ${log.shift==='mañana'?'badge-m':'badge-t'}">Turno ${log.shift}</span></div>
      </div>
      ${editing?`
        <input class="inline-input" type="number" id="tl-edit-qty" value="${log.qty}" min="1" onkeydown="if(event.key==='Enter')saveTaskLog(${log.id})">
        <button class="save-btn" onclick="saveTaskLog(${log.id})">Guardar</button>
        <button class="cancel-btn" onclick="cancelEditTaskLog()">Cancelar</button>`
      :`<span style="font-size:16px;font-weight:500;min-width:55px;text-align:right">${log.qty}</span>
        ${isEditor?`<button class="edit-btn" onclick="editTaskLog(${log.id})">Editar</button>
        <button class="del-btn" onclick="deleteTaskLog(${log.id})">×</button>`:''}`}
    </div>`;
  }).join('');
}

function rTpStaff(){
  const addForm=isEditor?`<div style="margin-bottom:16px">
    <div class="section-title">Agregar / actualizar semana</div>
    <div class="form-grid-4" style="margin-bottom:8px">
      <div class="form-group" style="margin:0"><label class="form-label">N° de semana (1-53)</label><input class="form-input" type="number" id="ws-week" placeholder="Ej: 16" min="1" max="53"></div>
      <div class="form-group" style="margin:0"><label class="form-label">Año</label><input class="form-input" type="number" id="ws-year" value="${new Date().getFullYear()}" min="2024"></div>
      <div class="form-group" style="margin:0"><label class="form-label">Operarios mañana</label><input class="form-input" type="number" id="ws-man" placeholder="Ej: 10" min="0"></div>
      <div class="form-group" style="margin:0"><label class="form-label">Operarios tarde</label><input class="form-input" type="number" id="ws-tar" placeholder="Ej: 8" min="0"></div>
    </div>
    <button class="btn-primary" onclick="addWeeklyStaff()">Guardar semana</button>
  </div>`:'';

  const list=weeklyStaff.length?`
    <div class="table-wrap"><table class="week-table">
      <thead><tr><th style="text-align:left">Semana</th><th>Operarios mañana</th><th>Operarios tarde</th><th>Total</th>${isEditor?'<th></th>':''}</tr></thead>
      <tbody>${[...weeklyStaff].sort((a,b)=>a.year!==b.year?a.year-b.year:a.week-b.week).map(s=>{
        const editing=editingStaffId===s.id;
        return`<tr>
          <td>Semana ${s.week} / ${s.year}</td>
          ${editing?`
            <td><input class="inline-input" type="number" id="ws-edit-man" value="${s.mañana}" min="0" style="width:60px"></td>
            <td><input class="inline-input" type="number" id="ws-edit-tar" value="${s.tarde}" min="0" style="width:60px"></td>
            <td>${s.mañana+s.tarde}</td>
            ${isEditor?`<td style="display:flex;gap:5px;justify-content:center">
              <button class="save-btn" onclick="saveStaff(${s.id})">Guardar</button>
              <button class="cancel-btn" onclick="cancelEditStaff()">Cancelar</button>
            </td>`:''}`
          :`<td>${s.mañana}</td><td>${s.tarde}</td><td style="font-weight:500">${s.mañana+s.tarde}</td>
            ${isEditor?`<td style="display:flex;gap:5px;justify-content:center">
              <button class="edit-btn" onclick="editStaff(${s.id})">Editar</button>
              <button class="del-btn" onclick="deleteStaff(${s.id})">×</button>
            </td>`:''}`}
        </tr>`;
      }).join('')}</tbody>
    </table></div>`:`<div class="empty">Sin registros de operarios.${isEditor?' Usá el formulario de arriba.':''}</div>`;

  return addForm+list;
}

// ── REGISTRO DE AVANCE TOTAL (Dashboard) ──────────────────────────
function rRegistroAvance(gp){
  const gep=elemGlobalProg();
  const nDone=blockList.filter(id=>blockData[id]?.status==='done').length;
  const hoy=todayTerminados();
  const daily=termByDay();
  const last14=daily.slice(-14);
  const weeks=tasksByWeek();

  const elemChart=last14.length?`
    <div class="card">
      <div class="card-title">Elementos terminados por día</div>
      <div style="margin-bottom:6px;display:flex;gap:12px">
        <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#888780"><div style="width:8px;height:8px;background:#97C459;border-radius:1px"></div>Unidades terminadas</div>
      </div>
      <div class="chart-bars">${last14.map(([d,v])=>{const maxV=Math.max(...last14.map(([,v])=>v),1);const h=Math.max(4,Math.round(v/maxV*80));return`<div class="chart-bar" style="height:${h}px" title="${d}: ${v} u."></div>`;}).join('')}</div>
      <div class="chart-dates">${last14.map(([d])=>`<div class="chart-date">${d.slice(5)}</div>`).join('')}</div>
    </div>`:`<div class="empty" style="margin-bottom:14px">Sin datos de producción todavía.</div>`;

  const weekTable=weeks.length?`<div class="card">
    <div class="card-title">Tareas por semana — por turno</div>
    <div class="table-wrap"><table class="week-table">
      <thead><tr><th style="text-align:left">Semana</th><th>Turno mañana</th><th>Turno tarde</th><th>Total tareas</th><th>Oper. mañana</th><th>Oper. tarde</th></tr></thead>
      <tbody>${weeks.map(w=>{
        const staff=getStaff(w.week,w.year);
        return`<tr>
          <td>Sem. ${w.week} / ${w.year}</td>
          <td><span class="badge badge-m">${w.mañana}</span></td>
          <td><span class="badge badge-t">${w.tarde}</span></td>
          <td style="font-weight:500">${w.mañana+w.tarde}</td>
          <td>${staff?staff.mañana:'<span style="color:#c0bfb8">—</span>'}</td>
          <td>${staff?staff.tarde:'<span style="color:#c0bfb8">—</span>'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div></div>`:
    `<div class="empty" style="margin-bottom:14px">Sin datos de tareas por semana.</div>`;

  const elemPct=gep.total?Math.round(gep.prod/gep.total*100):0;
  const blockRows=blockList.map(id=>{
    const b=blockData[id]||{status:'none',tasks:[]},p=bProg(id),s=STATUS[b.status]||STATUS.none;
    return`<tr><td><span style="display:inline-flex;align-items:center;gap:6px">
      <span style="width:8px;height:8px;border-radius:2px;background:${s.bg};border:1px solid ${s.bd};display:inline-block;flex-shrink:0"></span>${id}</span></td>
      <td><div class="pcell"><div class="pbar"><div class="pfill" style="width:${p.pct}%"></div></div><span class="pnum">${p.pct}%</span></div></td>
      <td style="white-space:nowrap">${p.done}/${p.total}</td>
      <td><span style="font-size:10px;padding:2px 7px;border-radius:4px;background:${s.bg};color:${s.tx};border:1px solid ${s.bd}">${s.label}</span></td></tr>`;
  }).join('');

  return`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Elementos producidos</div><div class="stat-value">${elemPct}%</div><div class="stat-sub">${gep.prod} / ${gep.total} u. necesarias</div></div>
      <div class="stat-card"><div class="stat-label">Terminados hoy</div><div class="stat-value">${hoy}</div><div class="stat-sub">elementos</div></div>
      <div class="stat-card"><div class="stat-label">Avance global (bloques)</div><div class="stat-value">${gp.pct}%</div><div class="stat-sub">${gp.done}/${gp.total} u.</div></div>
      <div class="stat-card"><div class="stat-label">Bloques terminados</div><div class="stat-value" style="color:#27500A">${nDone}/${blockList.length}</div><div class="stat-sub">bloques</div></div>
    </div>
    ${elemChart}
    ${weekTable}
    <div class="card"><div class="card-title">Estado de bloques</div><div class="table-wrap">
      <table><thead><tr><th>Bloque</th><th>Progreso</th><th>Unidades</th><th>Estado</th></tr></thead>
      <tbody>${blockRows}</tbody></table>
    </div></div>`;
}
